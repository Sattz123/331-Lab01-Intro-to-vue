<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intro SE331</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div class="nav-bar"></div>
        <div class="cart">Cart({{ cart }})</div>
        <button class="button" @click="toggleInStock" style="float: right; margin-right: 10px;">Toggle Stock</button>
        <div class="product-display">
            <div class="product-container">
                <div class="product-image">
                    <!-- image goes here -->
                    <img :src="image"/>
                </div>
            </div>
        </div>
        <div class="product-info">
            <h1><a :href="url">{{product}}</a></h1>
            <p v-if="!inStock">Out of Stock</p>
            <p v-else-if="inventory > 10">In Stock</p>
            <p v-else-if="inventory <= 10 && inventory > 0">Almost out of Stock</p>
            <p v-else>Out of Stock</p>
            <p v-if="onSale">On Sale!</p>
            <p v-else>Not on sale</p>
            <ul>
                <li v-for="detail in details">{{ detail }}</li>
            </ul>
            <div v-for="variant in variants" :key="variant.id" @mouseover="updateImage(variant.image)">
                {{ variant.color }}
            </div>
            <div>
                <span>Sizes: </span>
                <span v-for="size in sizes" :key="size" style="margin-right: 10px;">{{ size }} </span>
            </div>
            <button class="button" @click="addToCart">Add To Cart</button>
            <p>{{productDescription}}</p>
        </div>
    </div>

    <!-- Import Js -->
    <script src="./main.js"></script>
</body>

</html>
